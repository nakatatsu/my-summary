name: Build DevContainer Images

on:
  schedule:
    - cron: '0 0 10 * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - '.devcontainer/devcontainer.json'

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  OWNER: nakatatsu

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: infrastructure
            image: ci-infrastructure
          - target: backend
            image: ci-backend
          - target: frontend
            image: ci-frontend
          - target: local
            image: devcontainer-local

    steps:
      - uses: actions/checkout@v6

      - name: Build tag
        id: meta
        run: echo "build_tag=$(date -u +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ steps.meta.outputs.build_tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          cache-to: type=inline

      - name: Security scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-results.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: ${{ matrix.image }}
