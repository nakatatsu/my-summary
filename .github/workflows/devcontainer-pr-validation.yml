name: DevContainer PR Validation

on:
  pull_request:
    paths:
      - 'docker/**'
      - '.devcontainer/devcontainer.json'
      - '.github/workflows/devcontainer-*.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON files
        run: |
          jq empty .devcontainer/devcontainer.json

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/Dockerfile
          ignore: DL3008,DL3009,DL3015,DL4001,DL3016,DL3059
          failure-threshold: warning

  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: infrastructure
            image: ci-infrastructure
          - target: backend
            image: ci-backend
          - target: frontend
            image: ci-frontend
          - target: local
            image: devcontainer-local
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          load: true
          tags: ${{ matrix.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Verify base tools
        run: |
          docker run --rm ${{ matrix.image }}:test bash -c "
            set -e
            claude --version
            node --version
            npm --version
            git --version
            gh --version
            jq --version
            aws --version
            delta --version
            zsh --version
          "

      - name: Verify infrastructure tools
        if: matrix.target == 'infrastructure' || matrix.target == 'local'
        run: |
          docker run --rm ${{ matrix.image }}:test bash -c "
            set -e
            terraform version
            tflint --version
            checkov --version
            terraform-docs --version
          "

      - name: Verify backend tools
        if: matrix.target == 'backend' || matrix.target == 'local'
        run: |
          docker run --rm ${{ matrix.image }}:test bash -c "
            set -e
            go version
            gofumpt -version
            goimports -h 2>&1 | head -1
            golangci-lint --version
            govulncheck -version
            osv-scanner --version
            gosec -version
          "

      - name: Verify frontend tools
        if: matrix.target == 'frontend' || matrix.target == 'local'
        run: |
          docker run --rm ${{ matrix.image }}:test bash -c "
            set -e
            next --version
            tsc --version
            eslint --version
            prettier --version
          "
