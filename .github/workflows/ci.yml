name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      devcontainer: ${{ steps.filter.outputs.devcontainer }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            devcontainer:
              - 'docker/**'
              - '.devcontainer/devcontainer.json'
              - '.github/workflows/devcontainer-*.yml'

  devcontainer:
    needs: [changes]
    if: needs.changes.outputs.devcontainer == 'true'
    uses: ./.github/workflows/devcontainer-pr-validation.yml

  ci:
    runs-on: ubuntu-latest
    needs: [devcontainer]
    if: always()
    steps:
      - name: Check results
        env:
          DEVCONTAINER_RESULT: ${{ needs.devcontainer.result }}
        run: |
          if [ "$DEVCONTAINER_RESULT" = "failure" ]; then
            echo "devcontainer validation failed"
            exit 1
          fi
          echo "All checks passed"
