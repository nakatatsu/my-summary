name: DevContainer Monthly Update Issue

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Get current month
        id: date
        run: echo "yyyymm=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Create update issue
        uses: actions/github-script@v8
        env:
          YYYYMM: ${{ steps.date.outputs.yyyymm }}
        with:
          script: |
            const fs = require('fs');
            const yyyymm = process.env.YYYYMM;
            const body = fs.readFileSync('.github/issue-templates/devcontainer-monthly.md', 'utf8')
              .replace(/YYYY-MM/g, yyyymm);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DevContainer] ${yyyymm} ツールバージョン更新`,
              body,
              labels: ['devcontainer']
            });
